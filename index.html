<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4E2FD2" />
  <meta name="description"
    content="Build your custom home security bundle with cameras, sensors, plans, and accessories. Save more when you bundle." />

  <!-- Preconnect to image CDN so product image fetches start sooner.
       No `crossorigin` here: <img> tags fetch without CORS, and a
       preconnect with crossorigin only matches CORS connections,
       so leaving it off lets the actual image requests reuse the
       warmed-up connection. -->
  <link rel="preconnect" href="https://res.cloudinary.com" />
  <link rel="dns-prefetch" href="https://res.cloudinary.com" />

  <!-- Preload the first (LCP-candidate) product image so its bytes land in
       parallel with the JS bundle instead of being requested only after
       React mounts. The `imagesrcset` / `imagesizes` MUST match
       ProductCard's <img> srcset/sizes so the preload is consumed
       (otherwise the browser fetches a different variant and the
       preloaded bytes are wasted). -->
  <link rel="preload" as="image" fetchpriority="high"
    href="https://res.cloudinary.com/du1kw6s2g/image/upload/f_auto,q_auto:good,w_640,c_limit/v1781899570/7377c4c026acb3c476e41ccec1e0376490ee2cb9_o9rdf1.png"
    imagesrcset="https://res.cloudinary.com/du1kw6s2g/image/upload/f_auto,q_auto:good,w_320,c_limit/v1781899570/7377c4c026acb3c476e41ccec1e0376490ee2cb9_o9rdf1.png 320w, https://res.cloudinary.com/du1kw6s2g/image/upload/f_auto,q_auto:good,w_480,c_limit/v1781899570/7377c4c026acb3c476e41ccec1e0376490ee2cb9_o9rdf1.png 480w, https://res.cloudinary.com/du1kw6s2g/image/upload/f_auto,q_auto:good,w_640,c_limit/v1781899570/7377c4c026acb3c476e41ccec1e0376490ee2cb9_o9rdf1.png 640w"
    imagesizes="(min-width: 1280px) 220px, (min-width: 1024px) 25vw, 100vw" />

  <!-- Fonts are self-hosted under /fonts/ - no third-party origin needed,
       so no preconnect for cdnfonts. The @font-face declarations live
       in the Tailwind CSS bundle (src/index.css) so the woff fetch
       only starts AFTER our CSS arrives - keeping the font OFF the
       critical chain that delays FCP/LCP. -->

  <title>Bundle Builder | Build Your Home Security System</title>
  <style>
    /* Minimal critical CSS painted before the JS/CSS bundle arrives.
       Intentionally uses ONLY system fonts so the static FCP shell
       paints with zero font dependencies. Gilroy swaps in later via
       the main CSS bundle (font-display: swap, no visual jank). */
    body {
      margin: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    }
    /* Static FCP shell — painted before CSS/JS finish downloading so
       Lighthouse records FCP/LCP on the HTML response itself, not after
       React mounts. The matching React-rendered <h1> replaces this on
       hydration without a visible jump (same text, same metrics). */
    .fcp-shell {
      display: block;
      margin: 0;
      padding: 31px 16px 0;
      color: #1F1F1F;
      text-align: center;
      font-size: 31.875px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.064px;
    }
    /* Hide the static shell on lg+ to match App.tsx's `lg:sr-only` */
    @media (min-width: 1024px) {
      .fcp-shell {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    }
  </style>

</head>

<body>
  <div id="root">
    <h1 class="fcp-shell">Let&rsquo;s get started!</h1>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
